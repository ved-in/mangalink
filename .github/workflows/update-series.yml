name: Update Series Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push the updated series.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        run: node scrape/scrape.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/series.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated series data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series.json
          git commit -m "chore: update series data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push