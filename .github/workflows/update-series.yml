# .github/workflows/update-series.yml
#
# Two scheduled jobs keep the MangaLink data fresh without hammering scanlation sites.
#
# quick-update  -- every 6 hours
#   Runs `node scrape/scrape.js --quick`.  Each scraper stops as soon as it
#   detects a streak of unchanged series, so only a fraction of the usual
#   requests are made.  Status badges and new chapters appear within hours.
#
# deep-scan     -- every 2 days
#   Runs `node scrape/scrape.js` (no flag).  Full catalogue scrape at 2 req/s
#   per HTML source.  Catches new series, slug changes, deleted series, and
#   any status corrections that the quick pass might have missed.
#
# Both jobs:
#   - Check out the repo with the full history so scrape_state.json is present.
#   - Commit updated data files back to the repo when they change.
#   - Use a PAT (ACTIONS_PAT) so the push can trigger downstream pages deploys.

name: Update series data

on:
  schedule:
    # Quick update: every 6 hours
    - cron: '0 */6 * * *'
    # Deep scan: every 2 days at 03:00 UTC (avoids overlap with quick jobs)
    - cron: '0 3 */2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - deep

jobs:
  quick-update:
    name: Quick update
    # Run on every 6-hour tick AND on manual dispatch with mode=quick.
    # Skip when the deep-scan cron fires (03:00 UTC on even days) -- the
    # deep job covers that run.
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'quick')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quick scrape
        run: node scrape/scrape.js --quick

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/chunks/ data/scrape_state.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: quick update [skip ci]"
          git push

  deep-scan:
    name: Deep scan
    # Run on the every-2-days cron OR on manual dispatch with mode=deep.
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 3 */2 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'deep')
    runs-on: ubuntu-latest
    # Deep scans can take a long time given 2 req/s across ~13k Demonic series.
    # 360 minutes = 6 hours, which covers even worst-case catalogue sizes.
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run deep scrape
        run: node scrape/scrape.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/chunks/ data/scrape_state.json
          git diff --cached --quiet || git commit -m "chore: deep scan [skip ci]"
          git push
