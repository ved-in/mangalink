<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Link - Find Where to Read</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7639EMYFSH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7639EMYFSH');
</script>
<body>

<div class="home">
  <div class="h-screen-wrap">
    <div class="logo-center">
      <span class="logo">MangaLink</span>
    </div>
    <div class="hero_gallery">
      <div class="img_wrapper wrapper_left">
        <div class="gallery_img" style="background-image: url('public/left.jpg')"></div>
      </div>
      <div class="img_wrapper wrapper_right">
        <div class="gallery_img" style="background-image: url('public/right.jpg')"></div>
      </div>
    </div>
    <section class="search_overlay">
      <div class="search_box_outer">
        <div class="search_box_inner">
          <input type="text" class="search_input" id="search_input" placeholder="Search manga..." autocomplete="off">
          <button class="search_btn" id="search_btn">Search</button>
          <button class="bookmark_btn" id="bookmark_btn_home"><img src="public/book-marked.svg" alt="bookmark icon"></button>
        </div>
      </div>
    </section>
  </div>
</div>

  <footer>
    <div class="footer-content">
      <div class="footer-text">
        MangaLink does not host any content. All links point to third-party websites. &nbsp;·&nbsp;
        Data scraped from supported scanlations. &nbsp;·&nbsp;
        Built for readers, by readers.
      </div>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>

    const BASE = '/mangalink';

    document.getElementById('search_btn').addEventListener('click', () => {
      const q = document.getElementById('search_input').value;
      if (q) {
        window.location.href = BASE + '/search-result.html?q=' + encodeURIComponent(q);
      } else {
        window.location.href = BASE + '/search-result.html';
      }
    });
    document.getElementById('bookmark_btn_home').addEventListener('click', () => {
      window.location.href = BASE + '/bookmark.html';
    });
  </script>
</body>
</html>
