<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks — MangaLink</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/panel.css" />
</head>
<body>

<!-- NAV injected by nav.js -->

<div class="container" id="main_container">
  <div class="left_panel" id="left_panel">
    <div class="panel_header">
      <a href="/" class="panel-logo">Manga<span>Link</span></a>
      <div class="header_search" id="panel-search-wrap">
        <input type="text" autocomplete="off" class="search_input_2" id="search_input_2" placeholder="Search manga..." />
        <button class="search_btn_2" id="search_btn_2">Search</button>
        <button class="result_nav_btn" title="Browse" onclick="window.location.href=BASE+'/search-result.html'">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <div class="panel-suggestions" id="panel-suggestions"></div>
      </div>
    </div>

    <!-- Tab strip: Bookmarks | Results -->
    <div class="view-tabs">
      <button class="view-tab active" id="tab-bm" onclick="showTab('bookmarks')">Bookmarks</button>
      <button class="view-tab" id="tab-search" onclick="showTab('search')">Results</button>
    </div>

    <div id="search_view" class="panel_content" style="display:none">
      <div class="content_header">
        <span class="content_title">Search Results</span>
        <span class="content_count" id="results-count"></span>
      </div>
      <div id="results_list">
        <div class="empty_state"><p>Search for a title above</p></div>
      </div>
    </div>

    <div id="bookmarks_view" class="panel_content">
      <div class="content_header">
        <span class="content_title">My Bookmarks</span>
        <span class="content_count" id="bm-count"></span>
      </div>
      <div id="bm_list">
        <div class="empty_state"><p>No bookmarks yet.<br>Search a title and tap ★ to save.</p></div>
      </div>
    </div>
  </div>

  <div class="chapters_panel" id="chapters_panel" style="display:none">
    <div class="manga_header" id="manga_header">
      <button class="mobile_back_btn" id="mobile_back_btn">← Back</button>
      <div class="manga_header_cover" id="manga_header_cover"></div>
      <div class="manga_header_info">
        <div class="manga_header_title" id="manga_header_title">Select a title →</div>
        <div class="manga_header_meta" id="manga_header_meta"></div>
      </div>
      <button class="panel-bm-btn bookmarked" id="panel_bm_btn" title="Bookmark this series">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
      </button>
    </div>
    <div class="chapter_controls" style="display:none" id="chapter_controls">
      <input type="text" autocomplete="off" class="chapter_search" id="chapter_search" placeholder="Jump to ch…" />
      <button class="sort_btn" id="sort_btn" title="Sort order">↓</button>
    </div>
    <div class="chapters_list" id="chapters_list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal_box">
    <div class="modal_head">
      <div>
        <div class="modal_chapter_label" id="modal_chapter_label">Chapter</div>
        <div class="modal_title_text" id="modal_title">Title</div>
      </div>
      <button class="close_btn" id="close_modal">✕</button>
    </div>
    <div class="modal_body" id="modal_body">
      <div class="source_checking"><div class="spinner"></div><br>Checking sources…</div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/sources/utils.js"></script>
<script src="js/sources/asura.js"></script>
<script src="js/sources/demonic.js"></script>
<script src="js/sources/adk.js"></script>
<script src="js/sources/thunder.js"></script>
<script src="js/sources/temple.js"></script>
<script src="js/sources/flame.js"></script>
<script src="js/sources/violet.js"></script>
<script src="js/lib/adblock-checker.min.js"></script>
<script src="js/adblock.js"></script>
<script src="js/checker.js"></script>
<script src="js/ui.js"></script>
<script src="js/modal.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/app.js"></script>

<script>
  function showTab(tab) {
    const sv = document.getElementById('search_view');
    const bv = document.getElementById('bookmarks_view');
    const ts = document.getElementById('tab-search');
    const tb = document.getElementById('tab-bm');
    if (tab === 'search') {
      sv.style.display = 'flex'; bv.style.display = 'none';
      ts.classList.add('active'); tb.classList.remove('active');
    } else {
      bv.style.display = 'flex'; sv.style.display = 'none';
      tb.classList.add('active'); ts.classList.remove('active');
    }
  }

  // Auto-switch to results tab when search runs
  const origBtn = document.getElementById('search_btn_2');
  if (origBtn) {
    origBtn.addEventListener('click', () => showTab('search'), true);
  }

  // Panel suggestions
  (function() {
    const inp = document.getElementById('search_input_2');
    const box = document.getElementById('panel-suggestions');
    if (!inp || !box) return;
    let timer;
    inp.addEventListener('input', () => {
      clearTimeout(timer);
      const q = inp.value.trim();
      if (!q || q.length < 2) { box.classList.remove('visible'); return; }
      timer = setTimeout(async () => {
        if (typeof API === 'undefined') return;
        const res = await API.search_manga(q);
        if (!res.length) { box.classList.remove('visible'); return; }
        box.innerHTML = res.slice(0, 6).map(r =>
          `<div class="panel-sugg-item" data-t="${r.title.replace(/"/g,'&quot;')}">${r.title}</div>`
        ).join('');
        box.querySelectorAll('.panel-sugg-item').forEach(el => {
          el.addEventListener('mousedown', e => {
            e.preventDefault();
            inp.value = el.dataset.t;
            box.classList.remove('visible');
            showTab('search');
            document.getElementById('search_btn_2').click();
          });
        });
        box.classList.add('visible');
      }, 200);
    });
    inp.addEventListener('blur', () => setTimeout(() => box.classList.remove('visible'), 150));
  })();
</script>
</body>
</html>
